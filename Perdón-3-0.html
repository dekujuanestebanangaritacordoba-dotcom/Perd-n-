<title>¿Me perdonas?</title>

<style>
body{
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
}

.container{
    text-align: center;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    z-index: 2;
}

img{
    width: 220px;
    border-radius: 15px;
    animation: flotar 3s infinite ease-in-out;
}

h2{
    margin: 10px;
}

button{
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#si{
    background: #28a745;
    color: white;
}

#no{
    background: #dc3545;
    color: white;
}

#mensaje{
    margin-top: 15px;
    font-size: 18px;
}

/* corazones */
.corazon{
    position: absolute;
    color: #ff4d6d;
    animation: caer linear infinite;
}

@keyframes caer{
    from{transform: translateY(-10vh);}
    to{transform: translateY(110vh);}
}

@keyframes flotar{
    0%,100%{transform: translateY(0);}
    50%{transform: translateY(-10px);}
}
</style>
</head>

<h2 id="titulo">¿Me perdonas? 🥺💖</h2>

<button id="si">Sí 💚</button>
<button id="no">No 💔</button>

<p id="mensaje"></p>

</div>

<script>
// corazones
function crearCorazon(){
    const c = document.createElement("div");
    c.className = "corazon";
    c.innerText = "💖";
    c.style.left = Math.random()*100+"vw";
    c.style.fontSize = (Math.random()*20+15)+"px";
    c.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
}
setInterval(crearCorazon,300);

// lógica
let tamaño = 16;

const mensajes = [
"por favor 😔",
"ándale 😭",
"te prometo mejorar",
"mira el gatito 🥺",
"ya no sé qué hacer 😢",
"dame otra oportunidad 🙏"
];

let i = 0;

document.getElementById("no").onclick = function(){
    document.getElementById("mensaje").innerText = mensajes[i];
    i = (i+1)%mensajes.length;
    tamaño += 8;
    document.getElementById("si").style.fontSize = tamaño+"px";
};

document.getElementById("si").onclick = function(){
    document.getElementById("mensaje").innerText = "muchas gracias, prometo mejorar ❤️🥹";
};
</script>

</body>
</html>
